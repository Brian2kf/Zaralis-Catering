<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Zarali's Catering</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>

<body class="auth-page">
    <div class="auth-bg-decor-1"></div>
    <div class="auth-bg-decor-2"></div>

    <div class="auth-card">
        <div class="auth-header" style="padding-bottom: 1rem;">
            <h1 class="auth-title d-flex align-items-center justify-content-center gap-2">
                Zarali's Catering
            </h1>
            <p class="text-muted mb-0">Buat akun untuk mulai memesan</p>
        </div>

        <div class="auth-tabs">
            <a href="login.html" class="auth-tab">Login</a>
            <a href="register.html" class="auth-tab active">Daftar</a>
        </div>

        <div class="auth-body">
            <form action="login.html">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-dark mb-1">Nama Depan</label>
                    <div class="auth-input-group">
                        <span class="material-symbols-outlined auth-input-icon">person</span>
                        <input type="text" class="form-control auth-input py-2" id="first_name" name="first_name"
                            placeholder="Nama Depan" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-dark mb-1">Nama Belakang</label>
                    <div class="auth-input-group">
                        <span class="material-symbols-outlined auth-input-icon">person</span>
                        <input type="text" class="form-control auth-input py-2" id="last_name" name="last_name"
                            placeholder="Nama Belakang" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-dark mb-1">Email</label>
                    <div class="auth-input-group">
                        <span class="material-symbols-outlined auth-input-icon">mail</span>
                        <input type="email" class="form-control auth-input py-2" id="email" name="email"
                            placeholder="contoh@email.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-dark mb-1">Nomor Telepon / WA</label>
                    <div class="auth-input-group">
                        <span class="material-symbols-outlined auth-input-icon">call</span>
                        <input type="tel" class="form-control auth-input py-2" id="phone" name="phone"
                            placeholder="08123456789" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-dark mb-1">Password</label>
                    <div class="auth-input-group">
                        <span class="material-symbols-outlined auth-input-icon">lock</span>
                        <input type="password" class="form-control auth-input py-2" id="password" name="password"
                            placeholder="Password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold rounded-3 shadow-sm mb-4">Daftar
                    Sekarang</button>

                <div class="text-center">
                    <p class="small text-muted mb-2">
                        Sudah punya akun? <a href="login.html"
                            class="text-primary-custom fw-bold text-decoration-none">Login</a>
                    </p>
                    <a href="index.html"
                        class="small text-muted text-decoration-none d-inline-flex align-items-center gap-1 hover-primary transition-colors">
                        <span class="material-symbols-outlined" style="font-size: 16px;">arrow_back</span>
                        Kembali ke Beranda
                    </a>
                </div>
            </form>
        </div>
    </div>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
