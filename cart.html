<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja - Zarali's Catering</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="css/pages/cart.css">
</head>

<body class="d-flex flex-column min-vh-100" style="background-color: #FFF8F0;">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="container py-5 flex-grow-1">

        <header class="mb-4">
            <h1 class="display-6 fw-bold text-dark mb-2" style="font-family: 'Outfit', sans-serif;">Keranjang Belanja
            </h1>
            <p class="text-muted">Periksa kembali pesanan Anda sebelum melanjutkan ke pembayaran.</p>
        </header>

        <div class="row g-4">
            <!-- Left Column: Cart Items -->
            <div class="col-lg-8">
                <div class="d-flex flex-column gap-3">
                    <!-- Left Column: Cart Items -->
                    <div class="d-flex flex-column gap-3" id="cartItemsContainer">
                        <!-- Data keranjang dari JavaScript akan muncul di sini -->
                    </div>

                    <div class="mt-4">
                        <a href="menu.html"
                            class="text-decoration-none fw-semibold text-primary-custom d-flex align-items-center gap-2">
                            <span class="material-symbols-outlined fs-5">arrow_back</span>
                            Kembali Belanja
                        </a>
                    </div>
                </div>

                <div class="mt-4">
                    <a href="menu.html"
                        class="text-decoration-none fw-semibold text-primary-custom d-flex align-items-center gap-2">
                        <span class="material-symbols-outlined fs-5">arrow_back</span>
                        Kembali Belanja
                    </a>
                </div>
            </div>

            <!-- Right Column: Summary -->
            <div class="col-lg-4">
                <div class="summary-card p-4 position-sticky" style="top: 100px;">
                    <h3 class="h5 fw-bold mb-4" style="font-family: 'Outfit', sans-serif;">Ringkasan Belanja</h3>

                    <div class="d-flex flex-column gap-3 mb-4" id="cartSummaryDetails">
                        <div class="d-flex justify-content-between text-muted">
                            <span>Subtotal (0 Item)</span>
                            <span class="fw-medium text-dark">Rp 0</span>
                        </div>
                    </div>

                    <hr class="border-secondary opacity-25 mb-4">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fw-bold text-dark fs-5">Total</span>
                        <span class="fw-bold fs-4" style="color: #2D6A4F;" id="cartTotalText">Rp 0</span>
                    </div>

                    <!-- Validation Container -->
                    <div id="cartValidationContainer" class="mb-4 d-none">
                        <div class="alert alert-warning py-2 px-3 small mb-2 d-flex align-items-center gap-2"
                            role="alert">
                            <span class="material-symbols-outlined fs-5">warning</span>
                            <span id="packageCountWarning">Total Paket Kue Satuan: 0 / 10 paket</span>
                        </div>
                        <div id="itemCountWarning" class="text-danger small d-none">
                            <span class="material-symbols-outlined fs-6 align-middle">error</span>
                            Ada paket yang isinya kurang dari 3 kue.
                        </div>
                    </div>

                    <button id="btnCheckout"
                        class="btn btn-primary-custom w-100 py-3 fw-bold rounded-pill shadow-sm d-flex align-items-center justify-content-center gap-2 text-decoration-none disabled">Lanjut
                        Checkout <span class="material-symbols-outlined fs-5">arrow_forward</span></button>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/load-components.js"></script>
</body>

</html>
